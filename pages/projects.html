<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Проекты</title>
  <link rel="stylesheet" href="/styles.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' };
  </script>
</head>
<body class="p-6 bg-gray-100 text-gray-900 dark:bg-gray-900 dark:text-gray-100">
  <div id="globalAlerts" class="fixed top-2 right-2 z-50"></div>
  <div class="container">
    <button id="toggleTheme" class="btn mb-4 bg-gray-200 text-gray-900 dark:bg-gray-700 dark:text-gray-100">Тёмная тема</button>
    <nav class="flex flex-wrap gap-2 justify-center mb-2">
      <a href="/projects.html" class="btn">Проекты</a>
      <a href="/expenses.html" class="btn">Расходы</a>
      <a href="/finances.html" class="btn">Финансы</a>
      <a href="/reports.html" class="btn">Отчёты</a>
      <a href="/admin.html" class="btn">Админка</a>
      <a href="/history.html" class="btn">История</a>
    </nav>
    <h1 class="text-2xl font-bold my-4 text-center">Проекты</h1>
    <form id="projectForm" autocomplete="off" class="flex flex-wrap gap-2 mb-4 justify-center">
    <input name="name" placeholder="Название" required class="border rounded-xl p-2 flex-grow" />
    <select name="client" id="clientSelect" class="border rounded-xl p-2 flex-grow"></select>
    <select name="type" id="typeSelect" class="border rounded-xl p-2 flex-grow"></select>
    <input name="deadline" type="date" class="border rounded-xl p-2" />
    <label class="flex items-center gap-1 text-sm"><input type="checkbox" name="monthly" /> ежемесячно</label>
    <input name="amount" placeholder="Сумма" type="text" class="border rounded-xl p-2 w-32" />
    <select name="currency" class="border rounded-xl p-2">
      <option value="USD">$</option>
      <option value="SUM">сум</option>
    </select>
    <label class="flex items-center gap-1 text-sm"><input type="checkbox" name="starred" /> важный</label>
    <button type="submit" class="btn">Добавить</button>
  </form>
  <table class="table mb-6">
    <thead class="bg-gray-200 dark:bg-gray-700 sticky top-0">
      <tr>
        <th class="p-2">Название</th>
        <th class="p-2">Клиент</th>
        <th class="p-2">Тип</th>
        <th class="p-2">Начало</th>
        <th class="p-2">Дедлайн</th>
        <th class="p-2">Сумма</th>
        <th class="p-2">Статус</th>
        <th class="p-2">Действия</th>
      </tr>
    </thead>
    <tbody id="list"></tbody>
  </table>
    <script src="/projects.js"></script>
    <script src="/theme.js"></script>
    <script src="/alerts.js"></script>
  </div>
</body>
</html>
